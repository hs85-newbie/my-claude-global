name: Paperclip 일괄 정리 (수동 실행)

# WHY: 폭주/사고 시 누적된 sub-이슈를 일괄 cancelled 처리하기 위한 one-off 워크플로우
on:
  workflow_dispatch:
    inputs:
      parent_uuid:
        description: "정리할 root parent 이슈 UUID (재귀적으로 전체 후손 찾음)"
        required: true
        type: string
      target_status:
        description: "변경할 상태 (cancelled 권장)"
        default: "cancelled"
        type: string
      from_status:
        description: "현재 상태 필터 (todo/in_progress/in_review/all)"
        default: "todo"
        type: string
      dry_run:
        description: "true면 실제 변경 없이 대상만 출력"
        default: "true"
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Sub-이슈 일괄 상태 변경
        env:
          PAPERCLIP_URL: https://paperclip-production-7ed4.up.railway.app
          PAPERCLIP_COMPANY_ID: b80076db-214e-44a4-b016-427d7f0e3044
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PARENT_UUID: ${{ inputs.parent_uuid }}
          TARGET_STATUS: ${{ inputs.target_status }}
          FROM_STATUS: ${{ inputs.from_status }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "🔍 정리 대상 조회"
          echo "  parent_uuid: ${PARENT_UUID}"
          echo "  from_status: ${FROM_STATUS}"
          echo "  target_status: ${TARGET_STATUS}"
          echo "  dry_run: ${DRY_RUN}"
          echo ""

          ISSUES=$(curl -sf "${PAPERCLIP_URL}/api/companies/${PAPERCLIP_COMPANY_ID}/issues" \
            -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" 2>/dev/null || echo "[]")

          TOTAL=$(echo "$ISSUES" | jq 'length')
          echo "전체 이슈 수: ${TOTAL}"

          # WHY: 무한 루프로 손자/증손자까지 생긴 경우 대비 — 재귀적으로 후손 UUID 수집
          # BFS 방식: PARENT_UUID로 시작 → 자식들의 자식까지 모두 수집
          DESCENDANTS=$(echo "$ISSUES" | jq --arg root "$PARENT_UUID" '
            [$root] as $initial |
            reduce range(0; 20) as $i ($initial;
              . as $current |
              ($current + [.[] as $u | (input_filename | .)] |
                . + [(. as $list | $ENV.ISSUES_JSON // "[]" | fromjson | .[] | select(.parentId as $p | $list | index($p)) | .id)]) | unique
            )
          ' 2>/dev/null || echo "[]")

          # 위 jq가 복잡해서 단순화 — bash 루프로 BFS 구현
          CURRENT_LEVEL="$PARENT_UUID"
          ALL_DESCENDANTS=""
          for level in 1 2 3 4 5; do
            NEW_LEVEL=$(echo "$ISSUES" | jq -r --argjson parents "[\"$(echo $CURRENT_LEVEL | sed 's/ /\",\"/g')\"]" \
              '[.[] | select(.parentId as $p | $parents | index($p)) | .id] | .[]' 2>/dev/null || echo "")
            if [ -z "$NEW_LEVEL" ]; then
              echo "Level ${level}: 후손 없음 — 종료"
              break
            fi
            COUNT_LEVEL=$(echo "$NEW_LEVEL" | wc -l | tr -d ' ')
            echo "Level ${level}: ${COUNT_LEVEL}건 발견"
            ALL_DESCENDANTS="${ALL_DESCENDANTS}
${NEW_LEVEL}"
            CURRENT_LEVEL=$(echo "$NEW_LEVEL" | tr '\n' ' ')
          done

          # 후손 UUID 목록 정제
          DESCENDANT_UUIDS=$(echo "$ALL_DESCENDANTS" | grep -v '^$' | sort -u)
          DESC_COUNT=$(echo "$DESCENDANT_UUIDS" | grep -c '.' || echo 0)
          echo ""
          echo "총 후손 이슈 수: ${DESC_COUNT}"

          if [ "$DESC_COUNT" -eq 0 ]; then
            echo "✅ 정리할 후손 없음"
            exit 0
          fi

          # JSON 배열로 변환 후 status 필터
          DESCENDANT_JSON=$(echo "$DESCENDANT_UUIDS" | jq -R . | jq -s .)

          if [ "$FROM_STATUS" = "all" ]; then
            TARGETS=$(echo "$ISSUES" | jq --argjson uuids "$DESCENDANT_JSON" \
              '[.[] | select(.id as $i | $uuids | index($i)) | select(.status != "done" and .status != "cancelled")]')
          else
            TARGETS=$(echo "$ISSUES" | jq --argjson uuids "$DESCENDANT_JSON" --arg s "$FROM_STATUS" \
              '[.[] | select(.id as $i | $uuids | index($i)) | select(.status == $s)]')
          fi

          COUNT=$(echo "$TARGETS" | jq 'length')
          echo "📋 대상 ${COUNT}건"

          if [ "$COUNT" -eq 0 ]; then
            echo "✅ 정리할 이슈 없음"
            exit 0
          fi

          # 대상 목록 출력
          echo "$TARGETS" | jq -r '.[] | "  - \(.identifier): \(.title)"' | head -50
          if [ "$COUNT" -gt 50 ]; then
            echo "  ... (${COUNT}건 중 50건만 표시)"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo ""
            echo "⚠️ dry_run=true — 실제 변경 안 함"
            echo "실제 정리하려면 dry_run=false로 다시 실행"
            exit 0
          fi

          # 일괄 PATCH
          echo ""
          echo "🔄 상태 변경 중..."
          SUCCESS=0
          FAILED=0
          echo "$TARGETS" | jq -r '.[].id' | while read uuid; do
            if curl -sf -X PATCH "${PAPERCLIP_URL}/api/issues/${uuid}" \
              -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"status\":\"${TARGET_STATUS}\"}" > /dev/null 2>&1; then
              SUCCESS=$((SUCCESS + 1))
              echo "  ✅ ${uuid}"
            else
              FAILED=$((FAILED + 1))
              echo "  ❌ ${uuid}"
            fi
          done

          echo ""
          echo "✅ 정리 완료"
