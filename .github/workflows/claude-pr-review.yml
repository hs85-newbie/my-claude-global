name: Claude Code (PR 리뷰)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: hs85-newbie/my-claude-global
          path: .claude-global
          token: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
      - run: |
          mkdir -p ~/.claude
          cp .claude-global/CLAUDE.md ~/.claude/CLAUDE.md
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            이 PR을 리뷰해주세요.
            CLAUDE.md의 커밋 규칙, 코딩 원칙, 주석 규칙을 기준으로
            문제점과 개선사항을 PR 댓글로 남겨주세요.
            보안 이슈가 있으면 반드시 명시해주세요.
          claude_args: "--max-turns 10"
