name: Paperclip → Actions 중앙 디스패치

on:
  # WHY: 2026-04-09 sub-이슈 폭주 사태로 비활성화 (282건 누적, 빌링 한도 초과)
  # 재활성화 전 무한 루프 차단 + 폭주 감지 + 빌링 무료 한도 검증 필수
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Paperclip 이슈 처리 (todo 디스패치 + 승인 감지)
        env:
          PAPERCLIP_URL: https://paperclip-production-7ed4.up.railway.app
          PAPERCLIP_COMPANY_ID: b80076db-214e-44a4-b016-427d7f0e3044
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          AGENT_ID: 27bfd583-8296-4e15-a307-6b49c44d75a7
          GH_TOKEN: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
          OWNER: hs85-newbie
        run: |
          # 태그 파싱 함수
          parse_tag() {
            local TITLE="$1"
            BRANCH="main"
            if echo "$TITLE" | grep -qP '^\[.+?\]'; then
              TAG=$(echo "$TITLE" | grep -oP '^\[\K[^\]]+')
              TASK=$(echo "$TITLE" | sed 's/^\[[^]]*\]\s*//')
              if echo "$TAG" | grep -q ':'; then
                REPO=$(echo "$TAG" | cut -d: -f1)
                BRANCH=$(echo "$TAG" | cut -d: -f2)
              else
                REPO="$TAG"
              fi
            else
              REPO="my-claude-global"
              TASK="$TITLE"
            fi
          }

          # WHY: GitHub Actions private 레포 무료 한도(2,000분/월) 보호
          # public 레포는 매번 처리, private 레포는 매시 :00, :30 슬롯에서만 처리
          PUBLIC_REPOS="my-claude-global tms"
          MINUTE=$(date -u +%M)
          PRIVATE_SLOT=false
          if [ $((10#$MINUTE % 30)) -lt 5 ]; then
            PRIVATE_SLOT=true
          fi
          echo "현재 분: ${MINUTE}, private 슬롯: ${PRIVATE_SLOT}"

          # 전체 이슈 조회
          ISSUES=$(curl -sf "${PAPERCLIP_URL}/api/companies/${PAPERCLIP_COMPANY_ID}/issues" \
            -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" 2>/dev/null || echo "[]")

          # WHY: sub-이슈 폭주 감지 — 같은 parent 하위 누적 50건 이상 시 cron 자체 중단
          MAX_SUB_PER_PARENT=50
          EXPLOSION=$(echo "$ISSUES" | jq -r "[group_by(.parentId) | .[] | select(.[0].parentId != null) | {parent: .[0].parentId, count: length} | select(.count > ${MAX_SUB_PER_PARENT})]" 2>/dev/null || echo "[]")
          EXPLOSION_COUNT=$(echo "$EXPLOSION" | jq 'length' 2>/dev/null || echo 0)
          if [ "$EXPLOSION_COUNT" -gt 0 ]; then
            echo "🚨 폭주 감지 — sub-이슈 ${MAX_SUB_PER_PARENT}건 초과 parent ${EXPLOSION_COUNT}개"
            echo "$EXPLOSION" | jq -r '.[] | "  parent: \(.parent) — \(.count)건"'
            echo "❌ dispatch 전체 중단 (수동 정리 필요)"
            exit 0
          fi

          # ── 1. todo 이슈 → 디스패치 ──
          TODO=$(echo "$ISSUES" | jq '[.[] | select(.status == "todo")]' 2>/dev/null || echo "[]")
          TODO_COUNT=$(echo "$TODO" | jq length 2>/dev/null || echo 0)

          # 진행 중인 이슈 확인 (sub-이슈 순차 실행용)
          IN_PROGRESS=$(echo "$ISSUES" | jq '[.[] | select(.status == "in_progress")]' 2>/dev/null || echo "[]")
          IN_PROGRESS_PARENTS=$(echo "$IN_PROGRESS" | jq -r '.[].parentId // empty' 2>/dev/null | sort -u)

          if [ "$TODO_COUNT" -gt 0 ]; then
            echo "📋 todo 이슈 ${TODO_COUNT}건 — 디스패치"

            echo "$TODO" | jq -r '.[] | @base64' | while read encoded; do
              TITLE=$(echo "$encoded" | base64 -d | jq -r '.title')
              ISSUE_UUID=$(echo "$encoded" | base64 -d | jq -r '.id')
              ID=$(echo "$encoded" | base64 -d | jq -r '.identifier')
              DESC=$(echo "$encoded" | base64 -d | jq -r '.description // ""')
              PARENT_ID=$(echo "$encoded" | base64 -d | jq -r '.parentId // empty')

              # WHY: 완전 순차는 너무 느리고, 완전 병렬은 merge conflict 위험
              # 4-레이어 병렬 제어: MAX_CONCURRENT + 카테고리 그룹핑 + 예외 화이트리스트
              MAX_CONCURRENT=3
              # 파일 독립성이 확실한 카테고리 — 카테고리 내에서도 병렬 허용
              PARALLEL_CATEGORIES="보안|DB|알림|정리"

              if [ -n "$PARENT_ID" ]; then
                # 전체 동시 실행 상한 체크
                SIBLING_ACTIVE=$(echo "$ISSUES" | jq -r "[.[] | select(.parentId == \"${PARENT_ID}\" and (.status == \"in_progress\" or .status == \"in_review\"))] | length" 2>/dev/null || echo 0)
                if [ "$SIBLING_ACTIVE" -ge "$MAX_CONCURRENT" ]; then
                  echo "⏳ $ID — 동시 실행 ${SIBLING_ACTIVE}/${MAX_CONCURRENT}, 대기"
                  continue
                fi

                # 카테고리 추출: "[보안] 제목" → "보안"
                MY_CATEGORY=$(echo "$TITLE" | grep -oP '\[\K[^\]]+' | tail -1 || echo "")

                # 예외 화이트리스트가 아닌 카테고리 → 같은 카테고리 형제가 활성이면 대기
                if [ -n "$MY_CATEGORY" ] && ! echo "$MY_CATEGORY" | grep -qE "$PARALLEL_CATEGORIES"; then
                  SAME_CAT_ACTIVE=$(echo "$ISSUES" | jq -r "[.[] | select(.parentId == \"${PARENT_ID}\" and (.status == \"in_progress\" or .status == \"in_review\") and (.title | test(\"\\\\[${MY_CATEGORY}\\\\]\")))] | length" 2>/dev/null || echo 0)
                  if [ "$SAME_CAT_ACTIVE" -gt 0 ]; then
                    echo "⏳ $ID — [${MY_CATEGORY}] 카테고리 형제 진행 중, 대기"
                    continue
                  fi
                fi
              fi

              parse_tag "$TITLE"

              # WHY: private 레포는 30분 슬롯에서만 dispatch
              if ! echo "$PUBLIC_REPOS" | grep -qw "$REPO" && [ "$PRIVATE_SLOT" != "true" ]; then
                echo "⏭ $ID — private 레포 ($REPO), 30분 슬롯 대기"
                continue
              fi

              # WHY: 동일 이슈 재시도 카운터 — 최근 1시간 내 N회 이상 dispatch 시 자동 in_review
              # 2026-04-09 HSD-299/300 무한 재시도 사고 방지
              # 1시간 윈도우: 과거 카운트가 누적되어 정상 이슈 차단되는 부작용 방지
              MAX_RETRY=5
              CUTOFF=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)
              ATTEMPT_COUNT=$(curl -sf "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
                -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" 2>/dev/null \
                | jq -r --arg cutoff "$CUTOFF" '[.[] | select(.body | test("🚀 디스패치 시작")) | select(.createdAt > $cutoff)] | length' 2>/dev/null || echo 0)

              if [ "$ATTEMPT_COUNT" -ge "$MAX_RETRY" ]; then
                echo "🚫 $ID — 재시도 ${ATTEMPT_COUNT}회 초과(${MAX_RETRY}) → 자동 in_review"
                curl -sf -X PATCH "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}" \
                  -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"status\":\"in_review\"}" > /dev/null 2>&1 || true
                curl -sf -X POST "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
                  -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"body\":\"🚫 재시도 ${ATTEMPT_COUNT}회 초과 — 자동 in_review (수동 검토 필요)\"}" > /dev/null 2>&1 || true
                continue
              fi

              if [ -n "$DESC" ] && [ "$DESC" != "null" ]; then
                TASK="${TASK}. 상세: ${DESC}"
              fi

              TARGET="${OWNER}/${REPO}"
              echo "디스패치: $ID → $TARGET (${BRANCH})"

              # todo → in_progress
              curl -sf -X PATCH "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}" \
                -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"status\":\"in_progress\",\"assigneeAgentId\":\"${AGENT_ID}\"}" > /dev/null 2>&1 || true

              curl -sf -X POST "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
                -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"body\":\"🚀 디스패치 시작 → ${TARGET} (${BRANCH})\"}" > /dev/null 2>&1 || true

              # WHY: parent_id 누락 시 sub-이슈 자동 분할 가드 우회 → 무한 루프
              gh api "repos/${TARGET}/dispatches" \
                -f event_type=claude-task \
                -f "client_payload[task]=${TASK}" \
                -f "client_payload[issue_id]=${ID}" \
                -f "client_payload[issue_uuid]=${ISSUE_UUID}" \
                -f "client_payload[parent_id]=${PARENT_ID}" \
                -f "client_payload[branch]=${BRANCH}" \
                -f "client_payload[max_turns]=30" && echo "✅ $ID 디스패치 성공" \
                || echo "⚠️ $ID 디스패치 실패"
            done
          fi

          # ── 2. in_review 이슈 → 승인 코멘트 감지 ──
          IN_REVIEW=$(echo "$ISSUES" | jq '[.[] | select(.status == "in_review")]' 2>/dev/null || echo "[]")
          REVIEW_COUNT=$(echo "$IN_REVIEW" | jq length 2>/dev/null || echo 0)

          if [ "$REVIEW_COUNT" -gt 0 ]; then
            echo "🔍 in_review 이슈 ${REVIEW_COUNT}건 — 승인 코멘트 확인"

            echo "$IN_REVIEW" | jq -r '.[] | @base64' | while read encoded; do
              TITLE=$(echo "$encoded" | base64 -d | jq -r '.title')
              ISSUE_UUID=$(echo "$encoded" | base64 -d | jq -r '.id')
              ID=$(echo "$encoded" | base64 -d | jq -r '.identifier')

              # 최근 코멘트에서 "승인" 확인
              COMMENTS=$(curl -sf "${PAPERCLIP_URL}/api/issues/${ISSUE_UUID}/comments" \
                -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" 2>/dev/null || echo "[]")

              # 코멘트 본문이 정확히 "승인"만 있는 경우만 매칭 (안내문의 "승인" 텍스트 오탐 방지)
              APPROVED=$(echo "$COMMENTS" | jq -r '[.[] | select(.body | test("^승인$"))] | length' 2>/dev/null || echo 0)

              if [ "$APPROVED" -gt 0 ]; then
                echo "✅ $ID 승인 감지 — PR 생성 + 머지 디스패치"

                parse_tag "$TITLE"
                TARGET="${OWNER}/${REPO}"

                gh api "repos/${TARGET}/dispatches" \
                  -f event_type=claude-approve \
                  -f "client_payload[action]=approve" \
                  -f "client_payload[issue_id]=${ID}" \
                  -f "client_payload[issue_uuid]=${ISSUE_UUID}" \
                  -f "client_payload[issue_title]=${TASK}" \
                  -f "client_payload[branch]=${BRANCH}" && echo "✅ $ID 승인 디스패치 성공" \
                  || echo "⚠️ $ID 승인 디스패치 실패"
              fi
            done
          fi

          if [ "$TODO_COUNT" -eq 0 ] && [ "$REVIEW_COUNT" -eq 0 ]; then
            echo "대기 중인 이슈 없음 — 스킵"
          fi
