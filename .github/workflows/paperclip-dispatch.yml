name: Paperclip → Actions 중앙 디스패치

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 실행
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Paperclip 대기 이슈 확인 및 대상 레포로 디스패치
        env:
          PAPERCLIP_URL: https://paperclip-production-7ed4.up.railway.app
          PAPERCLIP_COMPANY_ID: b80076db-214e-44a4-b016-427d7f0e3044
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          AGENT_ID: 27bfd583-8296-4e15-a307-6b49c44d75a7
          GH_TOKEN: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
          OWNER: hs85-newbie
        run: |
          # Paperclip 이슈 상태 변경 함수
          update_issue() {
            local ISSUE_ID="$1" STATUS="$2" COMMENT="$3"
            local BODY="{\"status\":\"${STATUS}\""
            if [ "$STATUS" = "in_progress" ]; then
              BODY="${BODY},\"assigneeAgentId\":\"${AGENT_ID}\""
            fi
            BODY="${BODY}}"

            curl -sf -X PATCH "${PAPERCLIP_URL}/api/issues/${ISSUE_ID}" \
              -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$BODY" > /dev/null 2>&1 || true

            if [ -n "$COMMENT" ]; then
              curl -sf -X POST "${PAPERCLIP_URL}/api/issues/${ISSUE_ID}/comments" \
                -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"body\":\"${COMMENT}\"}" > /dev/null 2>&1 || true
            fi
          }

          # Paperclip에서 todo 상태 이슈 조회
          ISSUES=$(curl -sf "${PAPERCLIP_URL}/api/companies/${PAPERCLIP_COMPANY_ID}/issues" \
            -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" 2>/dev/null || echo "[]")

          TODO=$(echo "$ISSUES" | jq '[.[] | select(.status == "todo")]' 2>/dev/null || echo "[]")

          if [ "$TODO" = "[]" ] || [ -z "$TODO" ]; then
            echo "대기 중인 이슈 없음 — 스킵"
            exit 0
          fi

          COUNT=$(echo "$TODO" | jq length)
          echo "대기 이슈 ${COUNT}건 발견 — 대상 레포별 디스패치"

          echo "$TODO" | jq -r '.[] | @base64' | while read encoded; do
            TITLE=$(echo "$encoded" | base64 -d | jq -r '.title')
            ISSUE_UUID=$(echo "$encoded" | base64 -d | jq -r '.id')
            ID=$(echo "$encoded" | base64 -d | jq -r '.identifier')
            DESC=$(echo "$encoded" | base64 -d | jq -r '.description // ""')

            # [레포명] 또는 [레포명:브랜치] 패턴 추출
            BRANCH="main"
            if echo "$TITLE" | grep -qP '^\[.+?\]'; then
              TAG=$(echo "$TITLE" | grep -oP '^\[\K[^\]]+')
              TASK=$(echo "$TITLE" | sed 's/^\[[^]]*\]\s*//')
              if echo "$TAG" | grep -q ':'; then
                REPO=$(echo "$TAG" | cut -d: -f1)
                BRANCH=$(echo "$TAG" | cut -d: -f2)
              else
                REPO="$TAG"
              fi
            else
              REPO="my-claude-global"
              TASK="$TITLE"
            fi

            if [ -n "$DESC" ] && [ "$DESC" != "null" ]; then
              TASK="${TASK}. 상세: ${DESC}"
            fi

            TARGET="${OWNER}/${REPO}"
            echo "디스패치: $ID → $TARGET (${BRANCH}) — $TASK"

            # todo → in_progress
            update_issue "$ISSUE_UUID" "in_progress" "🚀 GitHub Actions 디스패치 시작 → ${TARGET} (${BRANCH})"

            # dispatch
            if gh api "repos/${TARGET}/dispatches" \
              -f event_type=claude-task \
              -f "client_payload[task]=${TASK}" \
              -f "client_payload[issue_id]=${ID}" \
              -f "client_payload[issue_uuid]=${ISSUE_UUID}" \
              -f "client_payload[branch]=${BRANCH}" \
              -f "client_payload[max_turns]=20"; then
              echo "✅ $ID 디스패치 성공"
            else
              echo "⚠️ $ID 디스패치 실패"
              update_issue "$ISSUE_UUID" "todo" "⚠️ 디스패치 실패: ${TARGET} 레포를 확인해주세요."
            fi
          done
