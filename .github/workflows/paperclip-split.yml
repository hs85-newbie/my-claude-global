name: Paperclip ANALYSIS 분할 (top-level 이슈 일괄 생성)

# WHY: ANALYSIS 파일의 항목들을 top-level 이슈로 일괄 생성
# - 각 이슈가 1개 항목만 처리 → max_turns 안전
# - top-level이라 sub-이슈 가드와 무관
# - cron이 5분 간격으로 1개씩 dispatch
on:
  workflow_dispatch:
    inputs:
      repo:
        description: "ANALYSIS 파일이 있는 레포 (예: hs85-newbie/tms)"
        required: true
        type: string
      branch:
        description: "브랜치 (예: dev)"
        default: "dev"
        type: string
      analysis_path:
        description: "ANALYSIS 파일 경로 (예: docs/ANALYSIS-HSD-13.md)"
        required: true
        type: string
      max_items:
        description: "최대 분할 개수"
        default: "15"
        type: string
      dry_run:
        description: "true=대상만 출력, false=실제 생성"
        default: "true"
        type: string

jobs:
  split:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ANALYSIS → Top-level 이슈 일괄 생성
        env:
          PAPERCLIP_URL: https://paperclip-production-7ed4.up.railway.app
          PAPERCLIP_COMPANY_ID: b80076db-214e-44a4-b016-427d7f0e3044
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          GH_TOKEN: ${{ secrets.GLOBAL_SETTINGS_TOKEN }}
          REPO: ${{ inputs.repo }}
          BRANCH: ${{ inputs.branch }}
          ANALYSIS_PATH: ${{ inputs.analysis_path }}
          MAX_ITEMS: ${{ inputs.max_items }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -e
          echo "🔍 ANALYSIS 분할"
          echo "  repo: ${REPO}"
          echo "  branch: ${BRANCH}"
          echo "  path: ${ANALYSIS_PATH}"
          echo "  max_items: ${MAX_ITEMS}"
          echo "  dry_run: ${DRY_RUN}"
          echo ""

          # ANALYSIS 파일 가져오기
          gh api "repos/${REPO}/contents/${ANALYSIS_PATH}?ref=${BRANCH}" -q '.content' \
            | base64 -d > /tmp/analysis.md

          if [ ! -s /tmp/analysis.md ]; then
            echo "❌ ANALYSIS 파일 빈 값 또는 가져오기 실패"
            exit 1
          fi

          echo "✅ ANALYSIS 파일 로드 ($(wc -l < /tmp/analysis.md)줄)"
          echo ""

          # 항목 추출 (- [ ] **[카테고리] 제목**)
          ITEMS=$(grep -P '^\s*-\s*\[\s*\]\s*\*\*\[' /tmp/analysis.md | head -n "${MAX_ITEMS}" || echo "")
          ITEM_COUNT=$(echo "$ITEMS" | grep -c '\*\*' || echo 0)

          if [ "$ITEM_COUNT" -eq 0 ]; then
            echo "❌ ANALYSIS에서 항목 추출 실패 — 패턴 확인 필요"
            exit 1
          fi

          echo "📋 추출된 항목: ${ITEM_COUNT}건"
          echo ""

          # 태그 prefix
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)
          TAG_PREFIX="[${REPO_NAME}:${BRANCH}]"

          # 기존 이슈 제목 조회 (멱등성) — cancelled/done은 제외 (active만 중복 체크)
          EXISTING=$(curl -sf "${PAPERCLIP_URL}/api/companies/${PAPERCLIP_COMPANY_ID}/issues" \
            -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" 2>/dev/null \
            | jq -r '[.[] | select(.status == "todo" or .status == "in_progress" or .status == "in_review")] | .[].title' || echo "")

          IDX=1
          CREATED=0
          SKIPPED=0
          echo "$ITEMS" | while IFS= read -r item; do
            ITEM_CLEAN=$(echo "$item" | sed 's/^\s*-\s*\[\s*\]\s*\*\*//' | sed 's/\*\*\s*$//' | sed 's/^\s*//' | head -c 120)
            if [ -z "$ITEM_CLEAN" ]; then
              IDX=$((IDX + 1))
              continue
            fi

            FULL_TITLE="${TAG_PREFIX} ${ITEM_CLEAN}"

            # 중복 차단
            if echo "$EXISTING" | grep -qF "$FULL_TITLE"; then
              echo "  ⏭ ${IDX}: 중복 — 스킵 (${ITEM_CLEAN})"
              SKIPPED=$((SKIPPED + 1))
              IDX=$((IDX + 1))
              continue
            fi

            # 항목의 다음 2줄(파일/설명) 추출
            LINE_NUM=$(grep -n "$(echo "$item" | head -c 50)" /tmp/analysis.md | head -1 | cut -d: -f1)
            DETAIL=""
            if [ -n "$LINE_NUM" ]; then
              DETAIL=$(sed -n "$((LINE_NUM+1)),$((LINE_NUM+2))p" /tmp/analysis.md | sed 's/^\s*-\s*//' | tr '\n' ' ')
            fi

            DESC="${ITEM_CLEAN}\n참조: ${ANALYSIS_PATH}\n\n${DETAIL}"
            DESC_JSON=$(echo -e "$DESC" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo "\"\"")

            if [ "$DRY_RUN" = "true" ]; then
              echo "  📝 ${IDX}: ${FULL_TITLE}"
              IDX=$((IDX + 1))
              continue
            fi

            # 실제 생성 (parentId 없이 → top-level)
            if curl -sf -X POST "${PAPERCLIP_URL}/api/companies/${PAPERCLIP_COMPANY_ID}/issues" \
              -H "Authorization: Bearer ${PAPERCLIP_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"${FULL_TITLE}\",\"description\":${DESC_JSON},\"status\":\"todo\",\"priority\":\"medium\"}" > /dev/null 2>&1; then
              echo "  ✅ ${IDX}: ${ITEM_CLEAN}"
              CREATED=$((CREATED + 1))
            else
              echo "  ❌ ${IDX}: 생성 실패 — ${ITEM_CLEAN}"
            fi

            IDX=$((IDX + 1))
          done

          echo ""
          if [ "$DRY_RUN" = "true" ]; then
            echo "⚠️ dry_run=true — 실제 생성 안 함"
          else
            echo "✅ 완료"
          fi
